# SimpleM 백엔드 운영 스택: api(FastAPI) + ocr(llama.cpp) + caddy(HTTPS 자동)
# 사용법은 DEPLOY.md 참고. 서버에서:  docker compose -f docker-compose.prod.yml up -d --build
services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env.production
    environment:
      # OCR은 사이드카 컨테이너로 — 앱이 llama-server.exe를 직접 띄우지 않게 고정
      OCR_BACKEND: llamacpp_vlm
      LLAMACPP_BASE_URL: http://ocr:8089
      LLAMACPP_AUTOSTART: "0"
    volumes:
      - ./data:/srv/backend/data          # chroma_db(법령 RAG) 등 영속 데이터
      - ./uploads:/srv/backend/uploads    # OCR 업로드 원본
    depends_on:
      - ocr
    expose:
      - "8000"

  ocr:
    # 파인튜닝 Qwen VLM GGUF를 CPU로 서빙. 모델 파일 2개를 ./models 에 올려둘 것:
    #   qwen35-08b-ocr-v2-q8.gguf, mmproj-qwen35-08b.gguf (vlm_finetune/output에서 복사)
    # 2B로 교체할 땐 파일명만 바꾸면 된다 (qwen35-2b-ocr-q8.gguf + mmproj-qwen35-2b.gguf).
    image: ghcr.io/ggml-org/llama.cpp:server
    restart: unless-stopped
    volumes:
      - ./models:/models:ro
    command: >
      -m /models/qwen35-08b-ocr-v2-q8.gguf
      --mmproj /models/mmproj-qwen35-08b.gguf
      --host 0.0.0.0 --port 8089 --ctx-size 8192
    expose:
      - "8089"

  caddy:
    # API_DOMAIN으로 들어오는 요청을 api로 프록시 + Let's Encrypt 인증서 자동 발급/갱신
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:-api.example.com}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
