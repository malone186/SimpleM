name: Deploy Frontend (Web) to Cloud Run

# main 브랜치에 frontend 코드가 push되면 Expo 웹 빌드를 Cloud Run(brewnote-web)에 재배포한다.
# 흐름:
#   1) 배포된 백엔드(brewnote-api)의 Cloud Run URL을 조회
#   2) frontend/.env.production 의 EXPO_PUBLIC_API_BASE_URL 를 그 URL로 치환
#      (EXPO_PUBLIC_* 는 expo export 시 번들에 박히므로 빌드 전에 값이 확정돼야 한다)
#   3) gcloud run deploy brewnote-web --source frontend
#
# ⚠️ 백엔드(brewnote-api)가 먼저 배포돼 있어야 URL을 조회할 수 있다.
#
# 이 배포는 "웹 버전"만 다룬다. 안드로이드 네이티브 앱은 EAS(별도)로 빌드하며,
# 앱의 API 주소는 frontend/.env·eas.json 을 백엔드 URL로 바꾸고 다시 빌드해야 한다.
#
# 필요한 Secret (deploy_backend와 공유): GCP_PROJECT_ID, GCP_SA_KEY

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy_frontend.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Inject backend URL into .env.production
        run: |
          BACKEND_URL=$(gcloud run services describe brewnote-api \
            --region asia-northeast3 --format 'value(status.url)' 2>/dev/null || true)
          if [ -z "$BACKEND_URL" ]; then
            echo "::error::백엔드(brewnote-api)를 찾을 수 없습니다 — 백엔드를 먼저 배포하세요"; exit 1
          fi
          echo "백엔드 URL: $BACKEND_URL"
          # EXPO_PUBLIC_API_BASE_URL 줄을 실제 백엔드 URL로 치환 (커밋하지 않고 빌드 컨텍스트에서만)
          sed -i "s|^EXPO_PUBLIC_API_BASE_URL=.*|EXPO_PUBLIC_API_BASE_URL=${BACKEND_URL}|" \
            frontend/.env.production
          grep "^EXPO_PUBLIC_API_BASE_URL=" frontend/.env.production

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy brewnote-web \
            --source frontend \
            --region asia-northeast3 \
            --allow-unauthenticated \
            --memory 512Mi \
            --quiet

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe brewnote-web \
            --region asia-northeast3 --format 'value(status.url)')
          echo "웹 배포 URL: $URL"
          code=$(curl -s -o /dev/null -w '%{http_code}' "$URL" || true)
          [ "$code" = "200" ] && echo "✅ web 200" \
            || { echo "::error::웹이 200을 반환하지 않았습니다 (got $code)"; exit 1; }
