name: Law RAG System CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-eval:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt || pip install fastapi uvicorn chromadb sqlalchemy pydantic httpx pytest

    - name: Run Law RAG Golden Set Evaluation
      run: |
        python backend/app/services/operation/eval_law_rag.py
